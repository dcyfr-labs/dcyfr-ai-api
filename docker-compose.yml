services:
  api:
    build: .
    ports:
      - '3001:3001'
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=/app/data/prod.db
      - JWT_SECRET=${JWT_SECRET}
      # CORS: Whitelist specific origins only (comma-separated)
      # Production: https://www.dcyfr.ai,https://dcyfr-labs.vercel.app
      # Development: http://localhost:3000,http://localhost:3001
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000,http://localhost:3001}
      # Linear / GitHub webhook
      - LINEAR_API_KEY=${LINEAR_API_KEY}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - DRY_RUN=${DRY_RUN:-true}
      - LINEAR_WEBHOOK_RATE_LIMIT_MAX=${LINEAR_WEBHOOK_RATE_LIMIT_MAX:-120}
      - LINEAR_WEBHOOK_RATE_LIMIT_WINDOW_MS=${LINEAR_WEBHOOK_RATE_LIMIT_WINDOW_MS:-60000}
      # Review-service SSRF allowlist (closes CodeQL js/request-forgery).
      # Empty in production rejects all webhooks (fail-closed). Default is
      # the dcyfr-labs org wildcard; tighten to specific repos if needed.
      - REVIEW_ALLOWED_REPOS=${REVIEW_ALLOWED_REPOS:-dcyfr-labs/*}
      # HTTP-API rate limits (defaults: 60/min auth+writes, 300/min reads)
      - RATE_LIMIT_AUTH_MAX=${RATE_LIMIT_AUTH_MAX:-60}
      - RATE_LIMIT_READ_MAX=${RATE_LIMIT_READ_MAX:-300}
      - RATE_LIMIT_WRITE_MAX=${RATE_LIMIT_WRITE_MAX:-60}
    volumes:
      - api-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/health']
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  api-data:
